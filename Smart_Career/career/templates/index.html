<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Главная</title>
    <link rel="stylesheet" href="{% static '/styleindex.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <header>
        <div class="container-fluid d-flex justify-content-between">
             <ul class="nav nav-underline">
                <li class="nav-item ">
                    <a class="nav-link active text-white" aria-current="page" href="{% url 'index' %}">Главная</a>
                </li>
            </ul>
            <ul class="nav nav-underline ms-auto">
                {% if not user.is_authenticated %}
                <li class="nav-item ms-auto">
                    <a class="nav-link text-white" href="auth/login">Вход</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="/auth/register/student">Регистрация</a>
                </li>
                {% else %}
                <li class="nav-item d-flex">
                    <a class="nav-link text-white" href="/profile">Личный кабинет</a>
                </li>
                {% endif %}
            </ul>
        </div>
    </header>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
