<!DOCTYPE html>
<html lang="ru" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | SkillMatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center text-slate-200">
    <div class="max-w-md w-full space-y-8 p-8 bg-slate-900 rounded-2xl border border-slate-800 shadow-2xl">
        <div class="text-center">
            <h2 class="text-3xl font-extrabold text-white tracking-tight">С возвращением!</h2>
            <p class="mt-2 text-sm text-slate-400">Войдите в свой аккаунт SkillMatch</p>
        </div>
        <form class="mt-8 space-y-6" method="POST">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="p-3 bg-red-900/50 border border-red-500 rounded-lg text-red-200 text-sm">
                    Неверный логин или пароль.
                </div>
            {% endif %}

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400">Имя пользователя</label>
                    <input name="username" type="text" required class="mt-1 block w-full px-3 py-2 bg-slate-950 border border-slate-700 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400">Пароль</label>
                    <input name="password" type="password" required class="mt-1 block w-full px-3 py-2 bg-slate-950 border border-slate-700 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div>
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    Войти
                </button>
            </div>
            <div class="text-center text-sm text-slate-400 mt-4">
                Нет аккаунта? 
                <a href="{% url 'register_student' %}" class="font-medium text-blue-500 hover:text-blue-400">Я студент</a> | 
                <a href="{% url 'register_employer' %}" class="font-medium text-emerald-500 hover:text-emerald-400">Я HR</a>
            </div>
        </form>
    </div>
</body>
</html>
