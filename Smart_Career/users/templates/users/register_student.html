<!DOCTYPE html>
<html lang="ru" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация Студента | SkillMatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        form p { margin-bottom: 1rem; }
        form label { display: block; font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.25rem; }
        form input, form select { width: 100%; padding: 0.5rem 0.75rem; background-color: #020617; border: 1px solid #334155; border-radius: 0.375rem; color: white; }
        form input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); }
        .helptext { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; display: block; }
        .errorlist { color: #ef4444; font-size: 0.875rem; list-style-type: none; padding: 0; margin-bottom: 0.5rem; }
    </style>
</head>
<body class="h-full flex items-center justify-center text-slate-200 py-10">
    <div class="max-w-md w-full space-y-6 p-8 bg-slate-900 rounded-2xl border border-slate-800 shadow-2xl">
        <div class="text-center">
            <h2 class="text-3xl font-extrabold text-blue-400 tracking-tight">Аккаунт Студента</h2>
            <p class="mt-2 text-sm text-slate-400">Найди работу, которая подходит именно тебе</p>
        </div>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="mt-4 w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors">
                Зарегистрироваться
            </button>
        </form>
        <div class="text-center text-sm">
            <a href="{% url 'login' %}" class="text-slate-400 hover:text-white">Уже есть аккаунт? Войти</a>
        </div>
    </div>
</body>
</html>
