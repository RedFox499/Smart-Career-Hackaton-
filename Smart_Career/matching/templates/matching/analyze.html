<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Smart Career | AI Matcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-blue-400">AI Анализ и подбор карьеры</h1>
        
        <form method="POST" enctype="multipart/form-data" class="glass-card p-8 rounded-3xl mb-12 shadow-2xl">
            {% csrf_token %}
            
            <div class="mb-6">
                <label class="block text-slate-400 mb-2 font-medium">Загрузить резюме (PDF, DOCX):</label>
                <input type="file" name="resume_file" accept=".pdf,.docx" 
                    class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-500 transition-all cursor-pointer">
            </div>

            <div class="flex items-center gap-4 mb-6 text-slate-500 text-xs font-bold uppercase">
                <div class="flex-1 border-t border-slate-800"></div>
                <span>ИЛИ</span>
                <div class="flex-1 border-t border-slate-800"></div>
            </div>

            <textarea name="resume_text" rows="5" 
                class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition mb-6"
                placeholder="Вставьте текст резюме здесь..."></textarea>
            
            <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold shadow-lg transition-transform active:scale-95">
                Проанализировать
            </button>
        </form>

        {% if analyzed %}
        <div class="space-y-6">
            {% for item in recommendations %}
            <div class="glass-card p-8 rounded-3xl flex justify-between items-center transition hover:border-blue-500/50">
                <div class="flex-1">
                    <h3 class="text-2xl font-bold mb-2">{{ item.vacancy.title }}</h3>
                    <p class="text-slate-400 text-sm mb-6 line-clamp-2 italic">"{{ item.reason }}"</p>
                    
                    <div class="flex gap-4">
                        <button onclick="openVacancy('{{ item.vacancy.title|escapejs }}', '{{ item.vacancy.description|escapejs }}')" 
                            class="px-6 py-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-sm font-semibold transition">
                            Описание
                        </button>
                        <button onclick="openRoadmap('{{ item.vacancy.title|escapejs }}', this.getAttribute('data-roadmap'))" 
                            data-roadmap='{{ item.roadmap_json|safe }}'
                            class="px-6 py-2 bg-emerald-600/10 text-emerald-400 border border-emerald-500/30 hover:bg-emerald-600/20 rounded-xl text-sm font-semibold transition">
                            План обучения
                        </button>
                    </div>
                </div>
                <div class="text-5xl font-black text-blue-500 ml-8">{{ item.score }}%</div>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div id="vModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-2xl rounded-3xl p-8 max-h-[80vh] overflow-y-auto">
            <h2 id="vTitle" class="text-2xl font-bold text-blue-400 mb-6"></h2>
            <div id="vBody" class="text-slate-300 whitespace-pre-wrap leading-relaxed"></div>
            <button onclick="closeModal('vModal')" class="mt-8 w-full py-3 bg-slate-800 rounded-xl font-bold">Закрыть</button>
        </div>
    </div>

    <div id="rModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="bg-slate-950 border border-emerald-500/30 w-full max-w-4xl rounded-[2.5rem] p-10 max-h-[85vh] overflow-y-auto">
            <h2 class="text-3xl font-bold text-emerald-400 mb-8">🚀 Рекомендуемый путь развития</h2>
            <div id="rContent" class="grid grid-cols-1 gap-6"></div>
            <button onclick="closeModal('rModal')" class="mt-10 w-full py-4 bg-emerald-600 rounded-2xl font-bold">Закрыть</button>
        </div>
    </div>

    <script>
        function openVacancy(t, b) {
            document.getElementById('vTitle').innerText = t;
            document.getElementById('vBody').innerText = b;
            document.getElementById('vModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function openRoadmap(title, rawData) {
            try {
                const data = JSON.parse(rawData);
                const cont = document.getElementById('rContent');
                cont.innerHTML = '';
                
                if (!data || data.length === 0) {
                    cont.innerHTML = '<p class="text-slate-500 text-center py-10">ИИ пока не сформировал план обучения для этой вакансии.</p>';
                } else {
                    data.forEach(step => {
                        cont.innerHTML += `
                            <div class="bg-slate-900/50 p-6 rounded-3xl border border-slate-800">
                                <h3 class="text-xl font-bold text-white mb-4">${step.skill}</h3>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div class="bg-blue-500/5 p-4 rounded-2xl border border-blue-500/10">
                                        <span class="text-[10px] uppercase text-blue-500 font-bold block mb-1">Статья</span>
                                        <p class="text-xs text-blue-200">${step.article}</p>
                                    </div>
                                    <div class="bg-red-500/5 p-4 rounded-2xl border border-red-500/10">
                                        <span class="text-[10px] uppercase text-red-500 font-bold block mb-1">Видео</span>
                                        <p class="text-xs text-red-200">${step.video}</p>
                                    </div>
                                    <div class="bg-emerald-500/5 p-4 rounded-2xl border border-emerald-500/10">
                                        <span class="text-[10px] uppercase text-emerald-500 font-bold block mb-1">Курс</span>
                                        <p class="text-xs text-emerald-200">${step.course}</p>
                                    </div>
                                </div>
                            </div>`;
                    });
                }
                document.getElementById('rModal').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } catch (e) {
                console.error("Ошибка:", e);
                alert("Ошибка при загрузке плана обучения.");
            }
        }
    </script>
</body>
</html>
